{% extends "base.html" %}

{% block title %}Login - ATS Resume Analyzer{% endblock %}

{% block content %}
<div style="max-width: 420px; margin: 3rem auto;">
    <div class="card">
        <div style="text-align: center; margin-bottom: 2rem;">
            <div class="brand-icon" style="margin: 0 auto 1rem auto; width: 48px; height: 48px; font-size: 1.25rem;">
                <i class="fa-solid fa-lock"></i>
            </div>
            <h2 style="font-size: 1.6rem; font-weight: 700;">Welcome Back</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Sign in to your ATS Resume Analyzer account</p>
        </div>

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="email_or_user" class="form-label">Email or Username</label>
                <input type="text" id="email_or_user" name="email_or_user" class="form-control" placeholder="john@example.com or john_doe" required autofocus>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.85rem; color: var(--text-muted);">
                    <input type="checkbox" name="remember" style="accent-color: var(--primary);"> Remember me
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fa-solid fa-arrow-right-to-bracket"></i> Sign In
            </button>
        </form>

        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
            Don't have an account? <a href="{{ url_for('register') }}" style="font-weight: 600;">Create One</a>
        </div>
    </div>
</div>
{% endblock %}
